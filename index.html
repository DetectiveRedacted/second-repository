
<!DOCTYPE html>
<html>
<head>
    <title>Таблица пользователей</title>
</head>
<body>
    <h1>Список пользователей</h1>
    <table border="1" cellpadding="5" cellspacing="0">
        <tr>
            <th>Login</th>
            <th>Email</th>
            <th>Time</th>
        </tr>
        {% for user in users %}
        <tr>
            <td>{{ user.login }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.time }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
